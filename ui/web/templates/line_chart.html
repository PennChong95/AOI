<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #chart { width: 100%; height: 100%; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: transparent;
}
</style>
</head>
<body>
<div id="chart"></div>
<script src="../echarts/echarts.min.js"></script>
<script>
var chart = echarts.init(document.getElementById('chart'), 'light');

var COLORS = ['#3B82F6', '#8B5CF6', '#10B981', '#F59E0B', '#EF4444', '#EC4899', '#06B6D4', '#F97316', '#84CC16', '#64748B'];

function renderLineChart(data) {
    var d = JSON.parse(data);
    var series = [];
    
    for (var i = 0; i < d.series.length; i++) {
        var s = d.series[i];
        var color = COLORS[i % COLORS.length];
        
        series.push({
            name: s.name,
            type: 'line',
            data: s.data,
            smooth: d.smooth !== false,
            symbol: 'circle',
            symbolSize: 6,
            showSymbol: true,
            lineStyle: { 
                width: 2.5,
                color: color
            },
            areaStyle: d.fill ? {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: color + '40' },
                    { offset: 1, color: color + '05' }
                ])
            } : undefined,
            itemStyle: { 
                color: color,
                borderColor: '#fff',
                borderWidth: 2
            }
        });
    }
    
    var option = {
        color: COLORS,
        tooltip: {
            trigger: 'axis',
            backgroundColor: '#FFFFFF',
            borderColor: '#E2E8F0',
            borderWidth: 1,
            textStyle: {
                color: '#1E293B',
                fontSize: 12
            }
        },
        legend: {
            bottom: 0,
            textStyle: {
                fontSize: 11,
                color: '#475569'
            },
            itemWidth: 12,
            itemHeight: 8,
            show: d.series.length > 1
        },
        grid: {
            left: 50,
            right: 20,
            top: 30,
            bottom: 40
        },
        xAxis: {
            type: 'category',
            data: d.xData || d.labels || [],
            axisLine: { 
                lineStyle: { 
                    color: '#E2E8F0'
                } 
            },
            axisLabel: { 
                color: '#94A3B8', 
                fontSize: 10
            },
            axisTick: { show: false },
            splitLine: { show: false }
        },
        yAxis: {
            type: 'value',
            splitLine: { 
                lineStyle: { 
                    color: '#F1F5F9',
                    type: 'dashed'
                } 
            },
            axisLabel: { 
                color: '#94A3B8', 
                fontSize: 10
            },
            axisLine: { show: false },
            axisTick: { show: false }
        },
        series: series,
        animationDuration: 1000,
        animationEasing: 'cubicInOut'
    };
    
    chart.setOption(option, true);
}

function renderChart(data) { renderLineChart(data); }

window.addEventListener('resize', function() { 
    chart.resize(); 
});
</script>
</body>
</html>
