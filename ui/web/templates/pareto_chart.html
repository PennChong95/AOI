<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #chart { width: 100%; height: 100%; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: transparent;
}
</style>
</head>
<body>
<div id="chart"></div>
<script src="../echarts/echarts.min.js"></script>
<script>
var chart = echarts.init(document.getElementById('chart'), 'light');

var COLORS = ['#3B82F6', '#8B5CF6', '#10B981', '#F59E0B', '#EF4444', '#EC4899', '#06B6D4', '#F97316', '#84CC16', '#64748B'];

function renderParetoChart(data) {
    var d = JSON.parse(data);
    var labels = d.labels || [];
    var values = d.values || [];
    var total = values.reduce(function(a, b) { return a + b; }, 0);
    var cumPct = [];
    var sum = 0;
    
    for (var i = 0; i < values.length; i++) {
        sum += values[i];
        cumPct.push(parseFloat((sum / total * 100).toFixed(1)));
    }
    
    var barData = values.map(function(v, i) {
        var color = COLORS[i % COLORS.length];
        return {
            value: v,
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: color },
                    { offset: 1, color: color + '80' }
                ]),
                borderRadius: [4, 4, 0, 0]
            }
        };
    });
    
    option = {
        color: COLORS,
        tooltip: {
            trigger: 'axis',
            axisPointer: { 
                type: 'cross'
            },
            backgroundColor: '#FFFFFF',
            borderColor: '#E2E8F0',
            borderWidth: 1,
            textStyle: {
                color: '#1E293B',
                fontSize: 12
            },
            formatter: function(params) {
                var tip = '<b>' + params[0].name + '</b><br/>';
                tip += params[0].marker + ' 数量: ' + params[0].value + '<br/>';
                tip += params[1].marker + ' 累计占比: ' + params[1].value + '%';
                return tip;
            }
        },
        legend: {
            bottom: 0,
            textStyle: {
                fontSize: 11,
                color: '#475569'
            },
            itemWidth: 12,
            itemHeight: 8
        },
        grid: {
            left: 50,
            right: 50,
            top: 30,
            bottom: 50
        },
        xAxis: {
            type: 'category',
            data: labels,
            axisLabel: { 
                color: '#94A3B8', 
                fontSize: 10,
                rotate: labels.length > 6 ? 30 : 0
            },
            axisTick: { show: false },
            axisLine: { 
                lineStyle: { 
                    color: '#E2E8F0'
                } 
            }
        },
        yAxis: [
            {
                type: 'value',
                name: '数量',
                nameTextStyle: {
                    color: '#94A3B8',
                    fontSize: 10
                },
                splitLine: { 
                    lineStyle: { 
                        color: '#F1F5F9',
                        type: 'dashed'
                    } 
                },
                axisLabel: { 
                    color: '#94A3B8', 
                    fontSize: 10
                },
                axisLine: { show: false },
                axisTick: { show: false }
            },
            {
                type: 'value',
                name: '累计%',
                nameTextStyle: {
                    color: '#EF4444',
                    fontSize: 10
                },
                min: 0,
                max: 100,
                splitLine: { show: false },
                axisLabel: { 
                    color: '#EF4444', 
                    fontSize: 10,
                    formatter: '{value}%'
                },
                axisLine: { show: false },
                axisTick: { show: false }
            }
        ],
        series: [
            {
                name: '缺陷数',
                type: 'bar',
                data: barData,
                barWidth: 24,
                label: { 
                    show: true, 
                    position: 'top', 
                    color: '#475569', 
                    fontSize: 9
                },
                animationDuration: 1000,
                animationEasing: 'cubicOut'
            },
            {
                name: '累计占比',
                type: 'line',
                yAxisIndex: 1,
                data: cumPct,
                smooth: true,
                symbol: 'circle',
                symbolSize: 6,
                lineStyle: { 
                    color: '#EF4444', 
                    width: 2.5
                },
                itemStyle: { 
                    color: '#EF4444',
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: {
                    show: true,
                    position: 'top',
                    color: '#EF4444',
                    fontSize: 9,
                    formatter: '{c}%'
                },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#EF444420' },
                        { offset: 1, color: '#EF444405' }
                    ])
                },
                animationDuration: 1000,
                animationEasing: 'cubicInOut'
            }
        ]
    };
    
    chart.setOption(option, true);
}

function renderChart(data) { renderParetoChart(data); }

window.addEventListener('resize', function() { 
    chart.resize(); 
});
</script>
</body>
</html>
