<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #chart { width: 100%; height: 100%; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: transparent;
}
</style>
</head>
<body>
<div id="chart"></div>
<script src="../echarts/echarts.min.js"></script>
<script>
var chart = echarts.init(document.getElementById('chart'), 'light');

var HEATMAP_COLORS = ['#DBEAFE', '#93C5FD', '#60A5FA', '#3B82F6', '#2563EB', '#1D4ED8'];

function renderHeatmapChart(data) {
    var d = JSON.parse(data);
    var xLabels = d.xLabels || [];
    var yLabels = d.yLabels || [];
    var maxVal = d.maxValue || 100;

    var seriesData = [];
    var items = d.items || [];
    
    if (items.length > 0) {
        for (var k = 0; k < items.length; k++) {
            seriesData.push({
                value: [items[k].x, items[k].y, items[k].value],
                label: items[k].label || '',
                itemStyle: {
                    borderRadius: 4,
                    borderColor: '#fff',
                    borderWidth: 2
                }
            });
        }
    }

    option = {
        tooltip: {
            backgroundColor: '#FFFFFF',
            borderColor: '#E2E8F0',
            borderWidth: 1,
            textStyle: {
                color: '#1E293B',
                fontSize: 12
            },
            formatter: function(p) {
                if (p.data && p.data.value && p.data.value.length >= 3) {
                    var label = p.data.label || '';
                    var value = p.data.value[2];
                    return '<b>' + label + '</b><br/>缺陷数: ' + value;
                }
                return '';
            }
        },
        grid: {
            left: 100,
            right: 40,
            top: 30,
            bottom: 60
        },
        xAxis: {
            type: 'category',
            data: xLabels,
            splitArea: { show: true },
            axisLabel: { 
                color: '#94A3B8', 
                fontSize: 10
            },
            axisTick: { show: false },
            axisLine: { 
                lineStyle: { 
                    color: '#E2E8F0'
                } 
            }
        },
        yAxis: {
            type: 'category',
            data: yLabels,
            splitArea: { show: true },
            axisLabel: { 
                color: '#94A3B8', 
                fontSize: 10
            },
            axisTick: { show: false },
            axisLine: { 
                lineStyle: { 
                    color: '#E2E8F0'
                } 
            }
        },
        visualMap: {
            min: 0,
            max: maxVal,
            calculable: false,
            orient: 'horizontal',
            left: 'center',
            bottom: 0,
            inRange: {
                color: HEATMAP_COLORS
            },
            textStyle: {
                color: '#94A3B8',
                fontSize: 10
            },
            itemWidth: 15,
            itemHeight: 120
        },
        series: [{
            name: '缺陷热力图',
            type: 'heatmap',
            data: seriesData,
            label: {
                show: true,
                color: '#1E293B',
                fontSize: 10,
                formatter: function(p) {
                    return p.data && p.data.label ? p.data.label : '';
                }
            },
            emphasis: {
                itemStyle: { 
                    shadowBlur: 10, 
                    shadowColor: 'rgba(0,0,0,0.2)' 
                }
            },
            animationDuration: 1000,
            animationEasing: 'cubicInOut'
        }]
    };
    
    chart.setOption(option, true);
}

function renderChart(data) { renderHeatmapChart(data); }

window.addEventListener('resize', function() { 
    chart.resize(); 
});
</script>
</body>
</html>
